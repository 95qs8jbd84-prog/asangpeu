<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SleepAid</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg: #080d1a;
            --card: #0e1628;
            --accent: #6c8fff;
            --accent2: #a78bfa;
            --text: #e2e8f0;
            --sub: #64748b;
            --border: rgba(108,143,255,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── 별 배경 (CSS only) ── */
        .star-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star-layer::before, .star-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 80% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 35% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 5% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 48% 95%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 5%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 95% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.5) 0%, transparent 100%);
        }
        .star-layer::after {
            background-image:
                radial-gradient(1px 1px at 8% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 12% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 3% 80%, rgba(255,255,255,0.4) 0%, transparent 100%);
            animation: twinkle 6s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.4; }
            to   { opacity: 1; }
        }

        /* ── 메인 카드 ── */
        #main-ui {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            padding: 16px;
            transition: opacity 0.6s ease;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 0 60px rgba(108,143,255,0.08), 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .moon-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        .moon-icon::after {
            content: '';
            position: absolute;
            top: 4px; left: 8px;
            width: 26px; height: 26px;
            background: var(--card);
            border-radius: 50%;
        }

        .logo-wrap h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--sub);
            font-size: 0.82rem;
            margin-bottom: 28px;
        }

        /* ── 소리 상태 표시 ── */
        .sound-info {
            background: rgba(108,143,255,0.07);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .sound-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .sound-wave span {
            display: block;
            width: 3px;
            border-radius: 2px;
            background: var(--accent);
            animation: wave 1.2s ease-in-out infinite;
        }
        .sound-wave span:nth-child(1) { height: 8px;  animation-delay: 0s; }
        .sound-wave span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
        .sound-wave span:nth-child(3) { height: 22px; animation-delay: 0.3s; }
        .sound-wave span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
        .sound-wave span:nth-child(5) { height: 8px;  animation-delay: 0.6s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
            50%       { transform: scaleY(1);   opacity: 1; }
        }

        .sound-detail { flex: 1; }
        .sound-detail .name { font-size: 0.95rem; font-weight: 500; }
        .sound-detail .desc { font-size: 0.75rem; color: var(--sub); margin-top: 2px; }

        /* ── 시간 선택 ── */
        .section-label {
            font-size: 0.75rem;
            color: var(--sub);
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .time-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .time-btn:hover { background: rgba(108,143,255,0.12); border-color: var(--accent); }
        .time-btn.active {
            background: linear-gradient(135deg, rgba(108,143,255,0.25), rgba(167,139,250,0.2));
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* ── 커스텀 시간 ── */
        .custom-wrap {
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .custom-wrap.show { display: flex; }
        .custom-wrap label { font-size: 0.82rem; color: var(--sub); white-space: nowrap; }
        .custom-wrap input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .custom-wrap input:focus { border-color: var(--accent); }
        .custom-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* ── 시작 버튼 ── */
        .start-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .start-btn:hover  { opacity: 0.9; }
        .start-btn:active { transform: scale(0.98); }

        /* ── 토스트 알림 ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 수면 모드 ── */
        #sleep-mode {
            display: none;
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0e1628 0%, #040810 100%);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: none;
        }
        #sleep-mode * { cursor: none; }
        #sleep-mode.show { display: flex; }

        .sleep-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .sleep-stars::before, .sleep-stars::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 5% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 18% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 32% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(2px 2px at 45% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 58% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 72% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(2px 2px at 25% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 10% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 5%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 95% 30%, rgba(255,255,255,0.7) 0%, transparent 100%);
            animation: sleepTwinkle 4s ease-in-out infinite alternate;
        }
        .sleep-stars::after {
            background-image:
                radial-gradient(1px 1px at 12% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 28% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 68% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(2px 2px at 82% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 3% 30%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 38% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 95%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 22% 15%, rgba(255,255,255,0.7) 0%, transparent 100%);
            animation-delay: 2s;
        }
        @keyframes sleepTwinkle {
            from { opacity: 0.3; }
            to   { opacity: 0.9; }
        }

        /* 달 */
        .sleep-moon {
            position: absolute;
            top: 60px; right: 80px;
            width: 70px; height: 70px;
            background: radial-gradient(circle at 40% 40%, #e2e8f0, #94a3b8);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(226,232,240,0.15), 0 0 80px rgba(226,232,240,0.05);
        }
        .sleep-moon::after {
            content: '';
            position: absolute;
            top: 10px; left: 18px;
            width: 54px; height: 54px;
            background: radial-gradient(circle at 40% 40%, #0e1628, #080d1a);
            border-radius: 50%;
        }

        .sleep-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .sleep-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        #timer-display {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .progress-bar-wrap {
            width: 220px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 1s linear;
        }

        /* 웨이브 시각화 */
        .wave-visual {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 50px;
        }
        .wave-visual span {
            display: block;
            width: 4px;
            border-radius: 3px;
            background: linear-gradient(to top, var(--accent), var(--accent2));
            opacity: 0.7;
            animation: bigWave 1.5s ease-in-out infinite;
        }
        .wave-visual span:nth-child(1)  { height: 10px; animation-delay: 0s; }
        .wave-visual span:nth-child(2)  { height: 20px; animation-delay: 0.1s; }
        .wave-visual span:nth-child(3)  { height: 30px; animation-delay: 0.2s; }
        .wave-visual span:nth-child(4)  { height: 40px; animation-delay: 0.3s; }
        .wave-visual span:nth-child(5)  { height: 50px; animation-delay: 0.4s; }
        .wave-visual span:nth-child(6)  { height: 40px; animation-delay: 0.3s; }
        .wave-visual span:nth-child(7)  { height: 30px; animation-delay: 0.2s; }
        .wave-visual span:nth-child(8)  { height: 20px; animation-delay: 0.1s; }
        .wave-visual span:nth-child(9)  { height: 10px; animation-delay: 0s; }
        @keyframes bigWave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.3; }
            50%       { transform: scaleY(1);   opacity: 0.9; }
        }

        #stop-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.5);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 10px 28px;
            border-radius: 20px;
            cursor: pointer !important;
            transition: all 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        #stop-btn:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
            border-color: rgba(255,255,255,0.3);
        }

        .exit-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.15);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="star-layer"></div>

<!-- 메인 화면 -->
<div id="main-ui">
    <div class="card">
        <div class="logo-wrap">
            <div class="moon-icon"></div>
            <h1>SleepAid</h1>
        </div>
        <p class="subtitle">편안한 수면을 위한 소리 테라피</p>

        <div class="sound-info">
            <div class="sound-wave">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="sound-detail">
                <div class="name">핑크 노이즈</div>
                <div class="desc">뇌파를 안정시키는 수면 최적화 주파수</div>
            </div>
        </div>

        <p class="section-label">수면 시간 선택</p>
        <div class="time-grid">
            <button class="time-btn" onclick="selectTime(1)">1시간</button>
            <button class="time-btn" onclick="selectTime(3)">3시간</button>
            <button class="time-btn active" onclick="selectTime(6)">6시간</button>
            <button class="time-btn" onclick="selectTime(0)">직접 입력</button>
        </div>

        <div class="custom-wrap" id="custom-wrap">
            <label>시간 입력</label>
            <input type="number" id="custom-input" min="1" max="12" placeholder="1~12 시간" />
        </div>

        <button class="start-btn" onclick="startSleepMode()">🌙 수면 모드 시작</button>
    </div>
</div>

<!-- 수면 모드 화면 -->
<div id="sleep-mode">
    <div class="sleep-stars"></div>
    <div class="sleep-moon"></div>

    <div class="sleep-content">
        <div class="sleep-label">수면 모드 진행 중</div>
        <div id="timer-display">06:00:00</div>
        <div class="progress-bar-wrap">
            <div id="progress-bar"></div>
        </div>
        <div class="wave-visual">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>
        <button id="stop-btn" onclick="stopSleepMode()">수면 종료</button>
    </div>

    <div class="exit-hint">화면을 터치하거나 종료 버튼을 누르세요</div>
</div>

<!-- 토스트 알림 -->
<div id="toast"></div>

<script>
    // ── 상태 변수 ──
    let selectedHours = 6;
    let timeLeft = 0;
    let totalTime = 0;
    let sleepTimer = null;
    let audioCtx = null;
    let noiseNode = null;
    let gainNode = null;
    let fadeInterval = null;

    // ── 시간 선택 ──
    function selectTime(hours) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        const customWrap = document.getElementById('custom-wrap');
        if (hours === 0) {
            customWrap.classList.add('show');
            selectedHours = 0;
        } else {
            customWrap.classList.remove('show');
            selectedHours = hours;
        }
    }

    // ── 토스트 ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Web Audio API 핑크 노이즈 생성 ──
    function createPinkNoise(ctx) {
        const bufferSize = 4096;
        let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
        const node = ctx.createScriptProcessor(bufferSize, 1, 1);
        node.onaudioprocess = function(e) {
            const out = e.outputBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const w = Math.random() * 2 - 1;
                b0 = 0.99886*b0 + w*0.0555179;
                b1 = 0.99332*b1 + w*0.0750759;
                b2 = 0.96900*b2 + w*0.1538520;
                b3 = 0.86650*b3 + w*0.3104856;
                b4 = 0.55000*b4 + w*0.5329522;
                b5 = -0.7616*b5 - w*0.0168980;
                out[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
                b6 = w * 0.115926;
            }
        };
        return node;
    }

    function startAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;
            noiseNode = createPinkNoise(audioCtx);
            noiseNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            // 페이드 인 (3초)
            let vol = 0;
            fadeInterval = setInterval(() => {
                vol = Math.min(vol + 0.01, 0.4);
                gainNode.gain.value = vol;
                if (vol >= 0.4) clearInterval(fadeInterval);
            }, 100);
        } catch(e) { console.warn('오디오 초기화 실패:', e); }
    }

    function stopAudio(callback) {
        if (!gainNode) { if(callback) callback(); return; }
        clearInterval(fadeInterval);
        let vol = gainNode.gain.value;
        fadeInterval = setInterval(() => {
            vol = Math.max(vol - 0.02, 0);
            gainNode.gain.value = vol;
            if (vol <= 0) {
                clearInterval(fadeInterval);
                try { noiseNode.disconnect(); gainNode.disconnect(); audioCtx.close(); } catch(e){}
                audioCtx = null; noiseNode = null; gainNode = null;
                if(callback) callback();
            }
        }, 80);
    }

    // ── 타이머 ──
    function updateTimerDisplay() {
        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').textContent =
            String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        const pct = totalTime > 0 ? ((totalTime - timeLeft) / totalTime * 100) : 0;
        document.getElementById('progress-bar').style.width = pct + '%';
    }

    // ── 수면 모드 시작 ──
    function startSleepMode() {
        let hours = selectedHours;
        if (hours === 0) {
            const val = parseInt(document.getElementById('custom-input').value);
            if (!val || val < 1 || val > 12) { showToast('1~12시간 사이로 입력해주세요'); return; }
            hours = val;
        }
        totalTime = hours * 3600;
        timeLeft  = totalTime;
        updateTimerDisplay();

        document.getElementById('main-ui').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('sleep-mode').classList.add('show');
        }, 500);

        startAudio();

        sleepTimer = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                stopSleepMode(true);
                return;
            }
            updateTimerDisplay();
        }, 1000);
    }

    // ── 수면 모드 종료 ──
    function stopSleepMode(ended = false) {
        clearInterval(sleepTimer);
        sleepTimer = null;

        stopAudio(() => {
            timeLeft = 0;
            document.getElementById('sleep-mode').classList.remove('show');
            document.getElementById('main-ui').style.display = 'flex';
            setTimeout(() => { document.getElementById('main-ui').style.opacity = '1'; }, 50);
            if (ended) showToast('수면 시간이 종료되었습니다 🌅');
            else showToast('수면 모드를 종료했습니다');
            // 타이머 원상 복귀
            const h = selectedHours || 6;
            timeLeft = h * 3600;
            totalTime = timeLeft;
            updateTimerDisplay();
        });
    }

    // ── 수면 모드 화면 터치/클릭 종료 ──
    document.getElementById('sleep-mode').addEventListener('click', function(e) {
        if (e.target.id !== 'stop-btn') stopSleepMode();
    });
    document.getElementById('sleep-mode').addEventListener('touchend', function(e) {
        if (e.target.id !== 'stop-btn') { e.preventDefault(); stopSleepMode(); }
    }, { passive: false });

    // ── stop-btn 커서 예외 ──
    document.getElementById('stop-btn').style.cursor = 'pointer';
    document.getElementById('stop-btn').addEventListener('mouseenter', function() {
        this.style.cursor = 'pointer';
    });
</script>
</body>
</html>
